app-id: net.fhannenheim.musicfetch
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
base: com.system76.Cosmic.BaseApp
base-version: stable
command: musicfetch_gui

finish-args:
  # Wayland access
  - --socket=wayland
  # X11 Fallback
  - --share=ipc
  - --socket=fallback-x11
  # Network for downloads
  - --share=network
  # Home directory access for saving photos/videos
  - --filesystem=xdg-music:rw
  # flathub-linter: skip=finish-args-unnecessary-xdg-config-cosmic-rw-access
  - --filesystem=xdg-config/cosmic:rw
  # D-Bus access for COSMIC config daemon (live theme/config updates)
  # The wildcard is needed because the settings daemon creates dynamic config proxy
  # names like com.system76.CosmicSettingsDaemon.Config.com.system76.CosmicTheme.Dark.V1
  - --talk-name=com.system76.CosmicSettingsDaemon
  - --talk-name=com.system76.CosmicSettingsDaemon.*
  # Needed to open the directory the songs are downloaded to
  # xdg portal can only open the top-level dir in the document portal
  - --talk-name=org.freedesktop.FileManager1

modules:
  - name: deno
    buildsystem: simple
    build-commands:
      - install -Dt /app/bin deno
    sources:
      - type: archive
        url: >-
          https://github.com/denoland/deno/releases/download/v2.7.5/deno-x86_64-unknown-linux-gnu.zip
        sha256: fd0a9e6cf085acb861b67577a13bfd0b1829e1c6d6a6dcfd35bcb8f05c973a47
        only-arches:
          - x86_64
      - type: archive
        url: >-
          https://github.com/denoland/deno/releases/download/v2.7.5/deno-aarch64-unknown-linux-gnu.zip
        sha256: 69259408777465378ad78ea97c3ec6722704a93caabdb8d272b36d93d8025101
        only-arches:
          - aarch64
  - name: yt-dlp-ejs
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app *.whl
    sources:
      - type: file
        url: >-
          https://files.pythonhosted.org/packages/59/f6/54fe93b9db02b7727043fb48816504f09066ca6d7f7d6145cd9d713a1047/yt_dlp_ejs-0.7.0-py3-none-any.whl
        sha256: 967e9cbe114ddfd046ff4668af18b1827b4597e2e47a83deea668a355828c798
        x-checker-data:
          type: pypi
          name: yt-dlp-ejs
          packagetype: bdist_wheel
  - name: yt-dlp
    buildsystem: simple
    build-commands:
      - pip3 install --no-dependencies --prefix=/app *.whl
    sources:
      - type: file
        url: >-
          https://files.pythonhosted.org/packages/f0/ef/52ed7ed10d2e1a22badf74b520b617c48b0a725a981620393245ac842bf9/yt_dlp-2026.3.13-py3-none-any.whl
        sha256: e22e7716f94c08e76b29c0172a3fe0c01d8cabab9bce7f528ad440d70a0d213c
        x-checker-data:
          type: pypi
          name: yt-dlp
          packagetype: bdist_wheel
  - name: musicfetch
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/musicfetch/cargo
        CARGO_TARGET_DIR: /run/build/musicfetch/target
    build-commands:
      # Build the application with cargo (version is passed via .flatpak-version file)
      - |
        cargo --offline fetch --manifest-path Cargo.toml --verbose
        cargo --offline build --release --verbose
      # Install the binary
      - install -Dm755 target/release/musicfetch_gui -t /app/bin/
      # Install desktop file
      - install -Dm644 resources/net.fhannenheim.musicfetch.desktop -t /app/share/applications/
      # Install icon
      - install -Dm644 resources/icons/hicolor/scalable/apps/net.fhannenheim.musicfetch.svg
        -t /app/share/icons/hicolor/scalable/apps/
      # Install metainfo
      - install -Dm644 resources/net.fhannenheim.musicfetch.metainfo.xml -t /app/share/metainfo/
    sources:
      - type: git
        url: https://codeberg.org/Frieder_Hannenheim/musicfetch-ng.git
        tag: 1.5.0
        commit: 93e9e5e3a81b242259d7e41a74bb891d1d8115ed
      - cargo-sources.json
